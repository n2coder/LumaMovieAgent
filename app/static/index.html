<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luma</title>
    <style>
      :root {
        --bg: #0b0e16;
        --panel: rgba(48, 51, 58, 0.78);
        --panel-border: rgba(255, 255, 255, 0.14);
        --ink: #eceef5;
        --muted: #b5bbc7;
        --accent: #ffffff;
        --line: rgba(255, 255, 255, 0.12);
        --chip: rgba(255, 255, 255, 0.06);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", "Noto Sans Devanagari", sans-serif;
      }
      .poster-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.3;
        overflow: hidden;
        pointer-events: none;
      }
      .poster-track {
        position: absolute;
        inset: -2% -20% -2% -20%;
        display: grid;
        grid-template-columns: repeat(10, minmax(80px, 1fr));
        grid-auto-rows: 138px;
        gap: 6px;
        padding: 6px;
        animation: slideWall 80s linear infinite alternate;
        filter: saturate(0.78) contrast(0.9);
      }
      .poster-track img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 8px;
      }
      @keyframes slideWall {
        from { transform: translateX(-14%); }
        to { transform: translateX(14%); }
      }
      .app {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 210px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        border-right: 1px solid var(--line);
        background: rgba(44, 47, 54, 0.38);
        backdrop-filter: blur(8px);
        padding: 18px 14px;
      }
      .brand-wrap {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        margin-bottom: 24px;
      }
      .brand {
        display: inline-flex;
        align-items: baseline;
        gap: 4px;
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--accent);
        text-shadow: 0 0 18px rgba(255, 255, 255, 0.35);
        line-height: 0.92;
      }
      .brand-tagline {
        font-size: 0.66rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.82);
        margin-left: 2px;
      }
      .brand-text {
        display: inline-block;
        line-height: 0.92;
      }
      .brand-popcorn {
        height: 0.92em;
        width: auto;
        object-fit: contain;
        transform: translateY(1px);
        filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.35));
      }
      .tabs {
        display: grid;
        gap: 10px;
      }
      .tab-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid transparent;
        color: var(--muted);
        background: transparent;
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1.12rem;
      }
      .tab-btn.active {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
        border-color: var(--line);
      }
      .main {
        padding: 18px;
        overflow-x: hidden;
      }
      #homePage, #discoverPage {
        max-width: 1220px;
        margin: 0 auto;
      }
      .glass {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        backdrop-filter: blur(12px);
      }
      .search-wrap {
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 10px;
        align-items: center;
      }
      .query {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(36, 40, 48, 0.7);
        color: var(--ink);
        padding: 14px 16px;
        font-size: 1.1rem;
      }
      .query::placeholder { color: #8fa2ca; }
      .query:focus { outline: none; border-color: #e6cb96; }
      .mic-btn {
        width: 94px;
        height: 50px;
        border-radius: 13px;
        border: 1px solid #595e66;
        background: #3a3e46;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
      }
      .wave { display: flex; gap: 3px; height: 14px; align-items: center; }
      .bar { width: 3px; height: 6px; border-radius: 99px; background: #6e768f; transform-origin: center bottom; }
      .mic-icon { width: 18px; height: 18px; fill: #d7d9df; }
      .mic-live .bar { background: #d7d9df; animation: pulse .76s ease-in-out infinite; }
      .mic-live .bar:nth-child(2) { animation-delay: .08s; }
      .mic-live .bar:nth-child(3) { animation-delay: .16s; }
      .mic-live .bar:nth-child(4) { animation-delay: .24s; }
      .mic-live .bar:nth-child(5) { animation-delay: .32s; }
      @keyframes pulse { 0%,100% { transform: scaleY(.75); } 50% { transform: scaleY(3); } }
      .search-btn {
        width: 50px; height: 50px; border-radius: 13px;
        border: 1px solid #666b74; background: #3a3e46; color: #eceef5;
        display: inline-flex; align-items: center; justify-content: center;
        cursor: pointer;
      }
      .mute-btn {
        width: 50px; height: 50px; border-radius: 13px;
        border: 1px solid #666b74; background: #3a3e46; color: #eceef5;
        display: inline-flex; align-items: center; justify-content: center;
        cursor: pointer;
      }
      .mute-btn svg { width: 20px; height: 20px; fill: currentColor; }
      .mute-btn.active {
        background: rgba(95, 44, 44, 0.8);
        border-color: rgba(255, 145, 145, 0.7);
      }
      .search-btn svg { width: 20px; height: 20px; fill: currentColor; }
      .status { color: var(--muted); font-size: .95rem; padding: 0 14px 12px; }

      .conversation {
        margin-top: 14px;
        padding: 14px;
      }
      .conv-line {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        margin-bottom: 10px;
        background: rgba(0, 0, 0, 0.18);
      }
      .conv-line span { white-space: pre-line; }
      .conv-line strong { color: #f0d6a1; }
      .conv-line strong { color: #d7d9df; }
      .section-title {
        margin-top: 16px;
        margin-bottom: 10px;
        font-size: 1.25rem;
        font-weight: 700;
      }
      .row-shell {
        position: relative;
      }
      .row-scroll {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 6px;
        scroll-snap-type: x mandatory;
      }
      .row-scroll::-webkit-scrollbar { height: 7px; }
      .row-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 99px; }
      .row-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        background: rgba(255, 255, 255, 0.28);
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 3;
        font-size: 1.8rem;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
      }
      .row-nav.left { left: -8px; }
      .row-nav.right { right: -8px; }
      .row-nav:hover { background: rgba(255, 255, 255, 0.45); }
      .movie-tile {
        flex: 0 0 210px;
        min-width: 210px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(58, 61, 68, 0.86);
        overflow: hidden;
        scroll-snap-align: start;
      }
      .movie-link {
        display: block;
        text-decoration: none;
        color: inherit;
      }
      .movie-tile img { width: 100%; height: 200px; object-fit: cover; }
      .movie-tile .meta { padding: 8px; }
      .movie-tile h4 { margin: 0 0 4px; font-size: .95rem; }
      .movie-tile p { margin: 0; color: var(--muted); font-size: .8rem; line-height: 1.35; }
      .genre-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
      .genre-chip {
        background: var(--chip);
        border: 1px solid var(--line);
        color: #dbe6ff;
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
      }
      .genre-chip.active { color: #fff; border-color: #efd39f; }
      .hidden { display: none !important; }
      .discover-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }
      #audioPlayer { display: none; }
      @media (max-width: 1050px) { .discover-grid { grid-template-columns: repeat(4, minmax(0,1fr)); } }
      @media (max-width: 860px) {
        .app { grid-template-columns: 1fr; }
        .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
        .tabs { grid-template-columns: 1fr 1fr; }
        .discover-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
        .movie-tile { flex: 0 0 180px; min-width: 180px; }
      }
      @media (max-width: 620px) {
        .search-wrap { grid-template-columns: 1fr auto auto auto; }
        .query { font-size: 1rem; padding: 12px; }
        .mic-btn { width: 82px; height: 46px; }
        .mute-btn { width: 46px; height: 46px; }
        .search-btn { width: 46px; height: 46px; }
        .discover-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      }
    </style>
  </head>
  <body>
    <div class="poster-bg">
      <div id="posterTrack" class="poster-track"></div>
    </div>
    <div class="app">
      <aside class="sidebar">
        <div class="brand-wrap">
          <div class="brand">
            <span class="brand-text">Luma</span>
            <img class="brand-popcorn" src="/static/popcorn-tub.png" alt="Popcorn tub logo accent" />
          </div>
          <div class="brand-tagline">BY N2CODER</div>
        </div>
        <div class="tabs">
          <button id="tabHome" class="tab-btn active">Home</button>
          <button id="tabDiscover" class="tab-btn">Discover</button>
        </div>
      </aside>

      <main class="main">
        <section id="homePage">
          <div class="glass">
            <div class="search-wrap">
              <input id="queryInput" class="query" type="text" placeholder="Ask Luma what to watch..." />
              <button id="voiceBtn" class="mic-btn" type="button" aria-label="Toggle microphone" title="Toggle microphone">
                <div class="wave" aria-hidden="true">
                  <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </div>
                <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 15a4 4 0 0 0 4-4V6a4 4 0 1 0-8 0v5a4 4 0 0 0 4 4Zm7-4a1 1 0 1 0-2 0 5 5 0 1 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-3.08A7 7 0 0 0 19 11Z"/>
                </svg>
              </button>
              <button id="muteBtn" class="mute-btn hidden" type="button" aria-label="Mute microphone" title="Mute microphone">
                <svg id="muteIconOn" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm6-3a1 1 0 1 0-2 0 4 4 0 0 1-8 0 1 1 0 1 0-2 0 6 6 0 0 0 5 5.91V19H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-2.09A6 6 0 0 0 18 11Zm2.7 8.3a1 1 0 0 1-1.4 1.4l-16-16a1 1 0 1 1 1.4-1.4l16 16Z"/>
                </svg>
              </button>
              <button id="sendBtn" class="search-btn" type="button" aria-label="Search">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M10 2a8 8 0 1 0 4.9 14.3l4.4 4.4a1 1 0 0 0 1.4-1.4l-4.4-4.4A8 8 0 0 0 10 2Zm0 2a6 6 0 1 1 0 12 6 6 0 0 1 0-12Z"/>
                </svg>
              </button>
            </div>
            <div id="status" class="status">Idle</div>
          </div>

          <section class="glass conversation">
            <div id="convUser" class="conv-line"><strong>User:</strong> <span id="convUserText">...</span></div>
            <div id="convAgent" class="conv-line"><strong>Luma Voice:</strong> <span id="convAgentText">How can I help you today?</span></div>
            <audio id="audioPlayer"></audio>
          </section>

          <section id="recommendedSection" class="hidden">
            <h3 class="section-title">Recommended for You</h3>
            <div class="row-shell">
              <button class="row-nav left" data-target="recommendedRow" aria-label="Scroll left">&#8249;</button>
              <section id="recommendedRow" class="row-scroll"></section>
              <button class="row-nav right" data-target="recommendedRow" aria-label="Scroll right">&#8250;</button>
            </div>
          </section>

          <h3 class="section-title">Top Movies</h3>
          <div class="row-shell">
            <button class="row-nav left" data-target="topMoviesRow" aria-label="Scroll left">&#8249;</button>
            <section id="topMoviesRow" class="row-scroll"></section>
            <button class="row-nav right" data-target="topMoviesRow" aria-label="Scroll right">&#8250;</button>
          </div>

          <h3 class="section-title">Genres</h3>
          <section id="genreChips" class="genre-row">
            <button class="genre-chip active" data-genre="">All</button>
            <button class="genre-chip" data-genre="Action">Action</button>
            <button class="genre-chip" data-genre="Science Fiction">Sci-Fi</button>
            <button class="genre-chip" data-genre="Comedy">Comedy</button>
            <button class="genre-chip" data-genre="Romance">Romance</button>
            <button class="genre-chip" data-genre="Drama">Drama</button>
          </section>
        </section>

        <section id="discoverPage" class="hidden">
          <h3 class="section-title">Discover - Top 50 Movies</h3>
          <section id="discoverGrid" class="discover-grid"></section>
        </section>
      </main>
    </div>
    <script src="/static/script.js"></script>
  </body>
  </html>
